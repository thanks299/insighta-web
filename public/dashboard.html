<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Insighta Labs+</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="navbar-brand">📊 Insighta Labs+</a>
    <ul class="navbar-nav">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/profiles">Profiles</a></li>
      <li><a href="/search">Search</a></li>
      <li><a href="/account">Account</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1>Dashboard</h1>
    <div class="stats-grid" id="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalProfiles">-</div>
        <div class="stat-label">Total Profiles</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalPages">-</div>
        <div class="stat-label">Total Pages</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="role">-</div>
        <div class="stat-label">Your Role</div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">Recent Profiles</h2>
      <div id="recentProfiles">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://hngstage3.onrender.com';
    
    // Get token from URL or localStorage
    const urlParams = new URLSearchParams(window.location.search);
    let token = urlParams.get('token');
    
    if (token) {
      // Save token to localStorage
      localStorage.setItem('access_token', token);
      // Remove token from URL to keep it clean
      window.history.replaceState({}, document.title, window.location.pathname);
      console.log('✅ Token saved from URL');
    } else {
      token = localStorage.getItem('access_token');
    }
    
    // If no token, redirect to login
    if (!token) {
      console.log('No token found, redirecting to login');
      window.location.href = '/login';
    }

    async function fetchWithAuth(url) {
      const storedToken = localStorage.getItem('access_token');
      if (!storedToken) {
        window.location.href = '/login';
        throw new Error('No token');
      }
      
      const response = await fetch(url, {
        headers: {
          'X-API-Version': '1',
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${storedToken}`
        },
        credentials: 'omit'  // Don't use cookies, use Authorization header
      });
      
      if (response.status === 401) {
        localStorage.removeItem('access_token');
        window.location.href = '/login';
      }
      return response;
    }

    async function loadDashboard() {
      try {
        const profiles = await fetchWithAuth(`${API_BASE_URL}/api/profiles?limit=5&page=1`);
        const profilesData = await profiles.json();
        
        document.getElementById('totalProfiles').textContent = profilesData.total || 0;
        document.getElementById('totalPages').textContent = profilesData.total_pages || 0;
        
        // Try to get role from somewhere
        document.getElementById('role').textContent = 'User';
        
        // Render recent profiles
        const recentDiv = document.getElementById('recentProfiles');
        if (profilesData.data && profilesData.data.length > 0) {
          recentDiv.innerHTML = `
            <table class="table">
              <thead>
                <tr><th>Name</th><th>Gender</th><th>Age</th><th>Country</th><th>Created</th></tr>
              </thead>
              <tbody>
                ${profilesData.data.map(p => `
                  <tr>
                    <td>${p.name}</td>
                    <td>${p.gender || 'N/A'}</td>
                    <td>${p.age || 'N/A'}</td>
                    <td>${p.country_id || 'N/A'}</td>
                    <td>${new Date(p.created_at).toLocaleDateString()}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        } else {
          recentDiv.innerHTML = '<p>No profiles found.</p>';
        }
      } catch (error) {
        console.error('Failed to load dashboard:', error);
        document.getElementById('recentProfiles').innerHTML = '<p>Failed to load profiles. Please <a href="/login">login again</a>.</p>';
      }
    }

    if (token) {
      loadDashboard();
    }
  </script>
</body>
</html>
