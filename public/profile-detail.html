<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Detail - Insighta Labs+</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/dashboard" class="navbar-brand">📊 Insighta Labs+</a>
    <ul class="navbar-nav">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/profiles">Profiles</a></li>
      <li><a href="/search">Search</a></li>
      <li><a href="/account">Account</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1>Profile Details</h1>
    <div class="card" id="profileDetail">
      <div class="loading">Loading profile...</div>
    </div>
    <button onclick="history.back()" class="btn btn-secondary">← Back</button>
  </div>

  <script>
    const API_BASE_URL = 'https://hngstage3.onrender.com';

    async function fetchWithAuth(url) {
      const response = await fetch(url, {
        headers: {
          'X-API-Version': '1',
          'Content-Type': 'application/json'
        },
        credentials: 'include'
      });
      return response;
    }

    async function loadProfile() {
      const urlParams = new URLSearchParams(window.location.search);
      const profileId = urlParams.get('id');
      
      if (!profileId) {
        document.getElementById('profileDetail').innerHTML = '<p>No profile ID provided.</p>';
        return;
      }
      
      try {
        const response = await fetchWithAuth(`${API_BASE_URL}/api/profiles/${profileId}`);
        const data = await response.json();
        
        if (data.status === 'success') {
          const p = data.data;
          document.getElementById('profileDetail').innerHTML = `
            <h2>${p.name}</h2>
            <table>
              <tr><th>ID</th><td>${p.id}</td></tr>
              <tr><th>Gender</th><td>${p.gender || 'N/A'} (${Math.round((p.gender_probability || 0) * 100)}%)</td></tr>
              <tr><th>Age</th><td>${p.age || 'N/A'} (${p.age_group || 'N/A'})</td></tr>
              <tr><th>Country</th><td>${p.country_name || p.country_id || 'N/A'} (${Math.round((p.country_probability || 0) * 100)}%)</td></tr>
              <tr><th>Created At</th><td>${new Date(p.created_at).toLocaleString()}</td></tr>
              <tr><th>Updated At</th><td>${new Date(p.updated_at).toLocaleString()}</td></tr>
            </table>
          `;
        } else {
          document.getElementById('profileDetail').innerHTML = '<p>Profile not found.</p>';
        }
      } catch (error) {
        console.error('Error loading profile:', error);
        document.getElementById('profileDetail').innerHTML = '<p>Error loading profile. Please <a href="/login">login again</a>.</p>';
      }
    }

    loadProfile();
  </script>
</body>
</html>
