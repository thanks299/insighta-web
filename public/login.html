<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Insighta Labs+</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1>🔐 Insighta Labs+</h1>
      <p>Sign in to access the Profile Intelligence System</p>
      <button class="github-btn" id="githubLoginBtn">
        🚀 Continue with GitHub
      </button>
      <div id="errorMessage" style="color: red; margin-top: 10px; display: none;"></div>
    </div>
  </div>
  <script>
    const API_BASE_URL = 'https://hngstage3.onrender.com';
    
    document.getElementById('githubLoginBtn').addEventListener('click', async function() {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.style.display = 'none';
      
      try {
        console.log('Fetching GitHub auth URL from:', `${API_BASE_URL}/auth/github`);
        
        const response = await fetch(`${API_BASE_URL}/auth/github`, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        
        console.log('Response status:', response.status);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        console.log('Response data:', data);
        
        if (data.url) {
          console.log('Redirecting to:', data.url);
          window.location.href = data.url;
        } else {
          throw new Error('No URL returned from server');
        }
      } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = `Login failed: ${error.message}. Please try again.`;
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
