<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Insighta Labs+</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1>🔐 Insighta Labs+</h1>
      <p>Sign in to access the Profile Intelligence System</p>
      <button class="github-btn" onclick="loginWithGitHub()">
        🚀 Continue with GitHub
      </button>
    </div>
  </div>
  <script>
    const API_BASE_URL = 'https://hngstage3.onrender.com';
    
    async function loginWithGitHub() {
      try {
        // Fetch the GitHub OAuth URL from your backend
        const response = await fetch(`${API_BASE_URL}/auth/github`);
        const data = await response.json();
        window.location.href = data.url;
      } catch (error) {
        console.error('Login failed:', error);
        alert('Failed to initiate login. Please try again.');
      }
    }
  </script>
</body>
</html>
